name: CI/CD Frontend

on:
  push:
    branches:
      - main
      - production

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build FE image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fe-project .

      - name: Push FE image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fe-project

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd project-folder
            docker pull ${{ secrets.DOCKER_USERNAME }}/fe-project
            docker-compose up -d frontend
